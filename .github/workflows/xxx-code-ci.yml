name: xxx-code CI

on:
  push:
    paths:
      - "xxx-code/**"
      - ".github/workflows/xxx-code-ci.yml"
  pull_request:
    paths:
      - "xxx-code/**"
      - ".github/workflows/xxx-code-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xxx-code
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: xxx-code/go.mod
          cache-dependency-path: xxx-code/go.sum

      - name: Check gofmt
        run: test -z "$(gofmt -l $(find . -type f -name '*.go'))"

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Check version command
        run: go run ./cmd/xxx-code --version

      - name: Run stability smoke
        run: |
          mkdir -p .artifacts
          go run ./cmd/xxx-code-stability \
            --iterations 1 \
            --concurrency 1 \
            --restart-every 1 \
            --summary-json .artifacts/stability-summary.json
          cat .artifacts/stability-summary.json

      - name: Upload stability summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xxx-code-stability-summary
          path: xxx-code/.artifacts/stability-summary.json
          if-no-files-found: warn
          retention-days: 7

      - name: Run demo workspace smoke
        run: bash ./scripts/demo-workspace-smoke.sh .artifacts/demo-workspace-smoke

      - name: Upload demo workspace smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xxx-code-demo-workspace-smoke
          path: xxx-code/.artifacts/demo-workspace-smoke
          if-no-files-found: warn
          retention-days: 7
